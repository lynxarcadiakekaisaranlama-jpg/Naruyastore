<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f0f1a;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111122;
  box-shadow:0 0 20px #6f00ff40;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 15px #00f7ff;
}

.neon{
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

nav button{
  background:transparent;
  border:1px solid #00f7ff;
  color:#00f7ff;
  padding:8px 14px;
  border-radius:8px;
  margin-left:5px;
  cursor:pointer;
  transition:0.3s;
}

nav button:hover{
  background:#00f7ff;
  color:black;
  box-shadow:0 0 15px #00f7ff;
}

/* SECTION */
section{
  padding:30px 20px;
  display:none;
}

.active{
  display:block;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

.hero h1{
  font-size:28px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.8;
  margin-bottom:25px;
}

.main-btn{
  background:#6f00ff;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 20px #6f00ff;
  transition:0.3s;
}

.main-btn:hover{
  box-shadow:0 0 35px #00f7ff;
}

/* PRODUCT */
.product{
  background:#15152b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 0 15px #6f00ff30;
}

.product h3{
  margin-bottom:5px;
}

.product button{
  margin-top:10px;
  background:#00f7ff;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

/* PAYMENT */
#qris{
  width:220px;
  margin-top:20px;
  border-radius:10px;
  box-shadow:0 0 20px #00f7ff;
}

.cek-btn{
  margin-top:15px;
  background:#6f00ff;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 15px #6f00ff;
}

#status{
  margin-top:15px;
  font-weight:600;
}

#timer{
  margin-top:10px;
  color:#00f7ff;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya <span class="neon">Store</span></h2>
  </div>
  <nav>
    <button onclick="showSection('profile')">Profile</button>
    <button onclick="showSection('store')">Store</button>
    <button onclick="showSection('payment')">Payment</button>
  </nav>
</header>

<!-- PROFILE -->
<section id="profile" class="active">
  <div class="hero">
    <h1>Premium Digital Store</h1>
    <p>Produk digital terpercaya & cepat diproses ⚡</p>
    <button class="main-btn" onclick="showSection('store')">Lihat Produk</button>
  </div>
</section>

<!-- STORE -->
<section id="store">
  <div class="product">
    <h3>Jasa Pasang Bot</h3>
    <p>Rp 5.000</p>
    <button onclick="beliProduk('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="product">
    <h3>Nokos Indo</h3>
    <p>Rp 4.000</p>
    <button onclick="beliProduk('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="product">
    <h3>Panel Pterodactyl</h3>
    <p>Rp 7.000</p>
    <button onclick="beliProduk('Panel Pterodactyl',7000)">Beli</button>
  </div>
</section>

<!-- PAYMENT -->
<section id="payment">
  <h2 id="produkDipilih"></h2>
  <p>Total: Rp <span id="totalHarga"></span></p>

  <img id="qris" src="roro.jpg">

  <div id="timer"></div>

  <button onclick="cekPembayaran()" class="cek-btn">
    Cek Pembayaran
  </button>

  <div id="status"></div>
</section>

<script>
let waktu = 300;
let timerInterval;

function showSection(id){
  document.querySelectorAll("section").forEach(sec=>{
    sec.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function beliProduk(nama,harga){
  showSection('payment');
  document.getElementById("produkDipilih").innerText = nama;
  document.getElementById("totalHarga").innerText = harga;
  document.getElementById("status").innerHTML = "";
  waktu = 300;
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);

  timerInterval = setInterval(function(){
    if(waktu <= 0){
      clearInterval(timerInterval);
      document.getElementById("timer").innerHTML = "⛔ Waktu pembayaran habis";
      return;
    }

    let menit = Math.floor(waktu / 60);
    let detik = waktu % 60;

    document.getElementById("timer").innerHTML =
      "QR berlaku: " + menit + "m " + detik + "s";

    waktu--;
  },1000);
}

function cekPembayaran(){
  let bukti = prompt("Masukkan nama pengirim / 4 digit terakhir nomor:");

  if(!bukti){
    alert("Isi data dulu!");
    return;
  }

  document.getElementById("status").innerHTML =
  "⏳ Sedang verifikasi pembayaran...";

  setTimeout(function(){
    document.getElementById("status").innerHTML =
    "✅ Pembayaran dikirim ke admin, tunggu konfirmasi.";

    window.location.href =
    "https://t.me/Narayuizumi?text=Saya sudah transfer atas nama "
    + bukti + " untuk produk "
    + document.getElementById("produkDipilih").innerText;

  },2000);
}
</script>

</body>
</html>
