<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* ================= VIDEO BACKGROUND ================= */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* overlay biar teks jelas */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:3px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
}

.logo h2{
  font-size:18px;
  text-shadow:0 0 10px #00ffff;
}

.top-btn{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  background:linear-gradient(45deg,#8f00ff,#00ffff);
  box-shadow:0 0 20px #00ffff;
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  margin-top:80px;
  padding:20px;
}

.hero h1{
  font-size:28px;
  margin-bottom:10px;
}

.hero span{
  font-size:26px;
  font-weight:bold;
  color:#00ffff;
  text-shadow:0 0 20px #00ffff;
}

.hero button{
  margin-top:30px;
  padding:14px 30px;
  border:none;
  border-radius:25px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00ffff);
  box-shadow:0 0 25px #00ffff;
}

/* ================= SECTION ================= */
section{
  display:none;
  padding:25px;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.4);
}

.price{
  color:#00ffff;
  margin:10px 0;
  font-weight:bold;
  text-shadow:0 0 10px #00ffff;
}

.card button{
  padding:10px 20px;
  border:none;
  border-radius:15px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00ffff);
  box-shadow:0 0 20px #00ffff;
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00ffff;
  margin-bottom:15px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <button class="top-btn" onclick="showProduk()">Lihat Produk</button>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Naruya Store Official</h1>
  <span>Solusi Digital Terpercaya</span><br>
  <button onclick="showProfile()">Profile</button>
</div>

<!-- PRODUK -->
<section id="produk">

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

</section>

<!-- PROFILE -->
<section id="profile">
  <div class="card">
    <h3>Contact & Social Media</h3>
    <p>WhatsApp: 6287733976909</p>
    <p>Instagram: izuku_tsuki</p>
    <p>Tiktok: narayu.kiyora</p>
    <p>Telegram: Narayuizumi</p>
    <br>
    <button onclick="window.location.href='https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R'">
      Saluran WhatsApp
    </button>
  </div>
</section>

<!-- PAYMENT -->
<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>

    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="number" id="total" readonly>

    <button onclick="kirim()">Kirim Bukti</button>
  </div>
</section>

<script>
function showProduk(){
  hideAll();
  document.getElementById("produk").style.display="block";
}

function showProfile(){
  hideAll();
  document.getElementById("profile").style.display="block";
}

function hideAll(){
  document.getElementById("produk").style.display="none";
  document.getElementById("profile").style.display="none";
  document.getElementById("payment").style.display="none";
}

function beli(nama,harga){
  hideAll();
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 Rp "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
