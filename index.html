<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.profile-img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin-top: 20px;
  object-fit: cover;
}

h1 {
  margin-top: 15px;
  font-size: 22px;
}

.desc {
  font-size: 14px;
  opacity: 0.8;
  margin-top: 8px;
  margin-bottom: 25px;
}

.button {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

.primary {
  background: #5865F2;
  color: white;
}

.primary:hover {
  background: #4752c4;
}

.secondary {
  background: #1f1f1f;
  color: white;
  border: 1px solid #333;
}

.secondary:hover {
  background: #2a2a2a;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="container">

<img src="logo.jpg" class="profile-img">
<h1>Naruya Store</h1>
<p class="desc">
Platform digital terpercaya untuk kebutuhan Anda.<br>
Cepat diproses, aman digunakan, kualitas terjamin.
</p>

<button class="button primary" onclick="window.location.href='#produk'">
Lihat Produk
</button>

<button class="button secondary" onclick="window.location.href='#profile'">
Profile
</button>

<button class="button secondary" onclick="alert('Silakan kirim bukti transfer ke admin untuk verifikasi.')">
Cek Pembayaran Sekarang
</button>

<section id="produk" style="margin-top:40px;">
<h2 style="margin-bottom:15px;">Produk Digital</h2>
<button class="button secondary">Panel Pterodactyl</button>
<button class="button secondary">Script Bot Telegram</button>
<button class="button secondary">Nokos All Negara</button>
</section>

<section id="profile" style="margin-top:40px;">
<h2 style="margin-bottom:15px;">Profile</h2>
<button class="button secondary" onclick="window.open('https://t.me/username')">
Telegram
</button>
<button class="button secondary" onclick="window.open('https://wa.me/6287733976909')">
WhatsApp
</button>
<button class="button secondary" onclick="window.open('https://tiktok.com/@username')">
TikTok
</button>
<button class="button secondary" onclick="window.open('https://whatsapp.com/channel/yourchannel')">
Saluran WhatsApp
</button>
</section>

<div class="footer">
© 2026 Naruya Store
</div>

</div>

</body>
</html>
