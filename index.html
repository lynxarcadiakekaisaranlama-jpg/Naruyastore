<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* DARK OVERLAY */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #00f7ff;
}

.btn{
  padding:10px 20px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#ff2e83,#a100ff);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h2{
  font-size:28px;
}

.hero span{
  color:#00f7ff;
}

/* SECTION */
section{
  padding:30px 20px;
  display:none;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
}

/* PROFILE */
.profile{
  text-align:center;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  margin-bottom:10px;
}

.social{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.social a{
  text-decoration:none;
  padding:10px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(45deg,#00f7ff,#8f00ff);
}

/* PRODUCTS */
.price{
  color:#00f7ff;
  margin:10px 0;
  font-weight:bold;
}

.buy{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  color:white;
  cursor:pointer;
}

/* PAYMENT */
.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00f7ff;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:rgba(0,0,0,0.7);
  color:white;
}

.btn-group{
  display:flex;
  flex-direction:column;
  gap:10px;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="anime.mp4" type="video/mp4">
</video>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h3>Naruya Store</h3>
  </div>
  <button class="btn" onclick="showSection('produk')">Lihat Produk</button>
</header>

<div class="hero">
  <h2>Naruya Store Official<br><span>Solusi Digital Terpercaya</span></h2>
  <br>
  <button class="btn" onclick="showSection('profile')">Profile</button>
</div>

<!-- PROFILE -->
<section id="profile">
  <div class="card profile">
    <img src="logo.jpg">
    <h3>Naruya Store</h3>
    <p>Store digital terpercaya.</p>

    <div class="social">
      <a href="https://wa.me/6287733976909" target="_blank">WhatsApp</a>
      <a href="https://t.me/Narayuizumi" target="_blank">Telegram</a>
      <a href="https://instagram.com/izuku_tsuki" target="_blank">Instagram</a>
      <a href="https://tiktok.com/@narayu.kiyora" target="_blank">TikTok</a>
      <a href="https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R" target="_blank">Saluran WhatsApp</a>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section id="produk">

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy" onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy" onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="card">
    <h3>SC Bot Nokos</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('SC Bot Nokos',5000)">Beli</button>
  </div>

</section>

<!-- PAYMENT -->
<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>

    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="number" id="total" readonly>

    <div class="btn-group">
      <button class="btn" onclick="kirim()">Kirim Bukti</button>
      <button class="btn" onclick="showSection('produk')">Kembali</button>
    </div>
  </div>
</section>

<script>
function showSection(id){
  document.querySelectorAll("section").forEach(sec=>sec.style.display="none");
  document.getElementById(id).style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}

function beli(nama,harga){
  showSection('payment');
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
