<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store Official</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#0f0f1f;
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-box{
  padding:25px 40px;
  border-radius:15px;
  border:2px solid #00f7ff;
  box-shadow:0 0 30px #00f7ff;
  text-align:center;
}

.loader-box img{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:10px;
  border:2px solid #00f7ff;
}

.loader-text{
  color:#00f7ff;
  font-weight:bold;
}

/* VIDEO BG */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.4);
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(15,15,30,0.8);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #00f7ff;
}

.logo h2{
  color:#00f7ff;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#6f00ff,#00f7ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 15px #00f7ff;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}

.hero h1{
  font-size:2.3rem;
  text-shadow:0 0 15px #00f7ff;
}

.hero p{
  margin:10px 0 20px;
  opacity:0.8;
}

/* PROFILE */
#profile{
  display:none;
  text-align:center;
  padding:20px;
}

.profile-card{
  max-width:400px;
  margin:auto;
  background:#15152b;
  padding:25px;
  border-radius:15px;
  border:1px solid #00f7ff;
  box-shadow:0 0 20px rgba(0,247,255,0.3);
}

.profile-card h3{
  color:#00f7ff;
  margin-bottom:10px;
}

.social-btn{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#6f00ff,#00f7ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.social-btn:hover{
  box-shadow:0 0 15px #00f7ff;
}

/* PRODUK */
.products{
  padding:20px;
}

.card{
  background:#15152b;
  padding:20px;
  margin-bottom:20px;
  border-radius:15px;
  border:1px solid #00f7ff;
  text-align:center;
  box-shadow:0 0 15px rgba(0,247,255,0.2);
}

.price{
  color:#00f7ff;
  font-size:1.2rem;
  margin:10px 0;
}

/* PAYMENT */
#payment{
  display:none;
  text-align:center;
  padding:30px 20px;
}

#payment img{
  max-width:280px;
  border-radius:15px;
  border:2px solid #00f7ff;
  margin:15px 0;
}

/* UP BUTTON */
#up{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:linear-gradient(45deg,#6f00ff,#00f7ff);
  color:white;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>

<video autoplay muted loop>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div id="loader">
  <div class="loader-box">
    <img src="logo.jpg">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <button class="btn" onclick="scrollProduk()">Produk</button>
</header>

<section class="hero">
  <h1>Naruya Store Official</h1>
  <p>Platform digital terpercaya, cepat, aman, harga terjangkau.</p>
  <button class="btn" onclick="toggleProfile()">Profile</button>
</section>

<section id="profile">
  <div class="profile-card">
    <h3>Kontak Kami</h3>
    <button class="social-btn" onclick="openLink('https://wa.me/6287733976909')">WhatsApp</button>
    <button class="social-btn" onclick="openLink('https://t.me/Narayuizumi')">Telegram</button>
    <button class="social-btn" onclick="openLink('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button class="social-btn" onclick="openLink('https://tiktok.com/@narayu.kiyora')">TikTok</button>
    <button class="social-btn" onclick="openLink('https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R')">Saluran WhatsApp</button>
  </div>
</section>

<section class="products" id="produk">
  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="btn" onclick="beli('Jasa Pasang Bot')">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="btn" onclick="beli('Nokos Indo')">Beli</button>
  </div>

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="btn" onclick="beli('Panel Pterodactyl')">Beli</button>
  </div>
</section>

<section id="payment">
  <h2>Scan QRIS</h2>
  <img src="roro.jpg">
  <br>
  <button class="btn" onclick="kirim()">Konfirmasi</button>
</section>

<button id="up" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<script>
window.onload = function(){
  setTimeout(()=>{ document.getElementById("loader").style.display="none"; },2000);
}

function toggleProfile(){
  let p = document.getElementById("profile");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function scrollProduk(){
  document.getElementById("produk").scrollIntoView({behavior:'smooth'});
}

function openLink(url){
  window.open(url);
}

function beli(nama){
  window.selected = nama;
  document.getElementById("payment").style.display="block";
  document.getElementById("payment").scrollIntoView({behavior:'smooth'});
}

function kirim(){
  let nama = prompt("Masukkan Nama:");
  if(!nama) return alert("Isi nama dulu!");

  let pesan =
  "Halo Admin, saya sudah bayar.\n\n" +
  "📦 Produk: " + window.selected + "\n" +
  "👤 Nama: " + nama + "\n" +
  "💰 Mata Uang: IDR";

  window.location.href = 
  "https://t.me/Narayuizumi?text=" + encodeURIComponent(pesan);
}
</script>

</body>
</html>
