<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

.container{
  max-width:500px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:#1a1a2e;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.buy{
  background:#ff003c;
  color:white;
}

.action{
  margin-top:10px;
  background:#222;
  color:white;
  border:1px solid #ff003c;
}

#qrSection{
  display:none;
  margin-top:20px;
}

#statusBox{
  display:none;
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  background:#1a1a2e;
  border:1px solid #ff003c;
}
</style>
</head>

<body>

<div class="container">

<h2>Naruya Store</h2>

<div class="card">
  <h3>Jasa Pasang Bot</h3>
  <p>Rp 5.000</p>
  <button class="buy" onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
</div>

<div class="card">
  <h3>Nokos Indo</h3>
  <p>Rp 4.000</p>
  <button class="buy" onclick="beli('Nokos Indo',4000)">Beli</button>
</div>

<div class="card">
  <h3>Panel Pterodactyl</h3>
  <p>Rp 7.000</p>
  <button class="buy" onclick="beli('Panel Pterodactyl',7000)">Beli</button>
</div>

<div class="card">
  <h3>SC Bot Nokos</h3>
  <p>Rp 5.000</p>
  <button class="buy" onclick="beli('SC Bot Nokos',5000)">Beli</button>
</div>

<div id="qrSection">
  <h3 id="produk"></h3>
  <p id="harga"></p>

  <img src="roro.jpg" width="250">

  <br><br>

  <button class="action" onclick="kirimBukti()">Kirim Bukti</button>
  <button class="action" onclick="cekStatus()">Cek Pembayaran</button>

  <div id="statusBox"></div>
</div>

</div>

<script>
let statusPembayaran = "belum";

function beli(nama,harga){
  document.getElementById("qrSection").style.display="block";
  document.getElementById("produk").innerText=nama;
  document.getElementById("harga").innerText="Total: Rp "+harga;
  document.getElementById("statusBox").style.display="none";
}

function kirimBukti(){

  let namaProduk = document.getElementById("produk").innerText;

  if(!namaProduk){
    alert("Pilih produk dulu!");
    return;
  }

  statusPembayaran="menunggu";

  document.getElementById("statusBox").style.display="block";
  document.getElementById("statusBox").innerHTML=
  "⏳ Pembayaran sedang diverifikasi admin...";

  let pesan="Halo Admin, saya sudah bayar untuk "+namaProduk;

  window.open(
  "https://t.me/Narayuizumi?text="+encodeURIComponent(pesan),
  "_blank"
  );
}

function cekStatus(){

  let box=document.getElementById("statusBox");

  if(statusPembayaran==="belum"){
    alert("Kamu belum kirim bukti pembayaran!");
    return;
  }

  if(statusPembayaran==="menunggu"){
    box.style.display="block";
    box.innerHTML="⏳ Masih menunggu verifikasi admin...";
  }

}
</script>

</body>
</html>
