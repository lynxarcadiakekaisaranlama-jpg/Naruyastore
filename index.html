<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* ================= LOADING SCREEN ================= */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:url("loading.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-box{
  display:flex;
  align-items:center;
  gap:15px;
  background:rgba(0,0,0,0.6);
  padding:20px 30px;
  border-radius:20px;
  backdrop-filter:blur(8px);
}

.loader-circle{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00f7ff;
  box-shadow:0 0 10px #00f7ff;
}

.loader-text{
  color:#00f7ff;
  font-size:18px;
  font-weight:bold;
  letter-spacing:2px;
}

/* ================= VIDEO ================= */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  pointer-events:none;
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #00f7ff;
}

/* ================= BUTTON ================= */
button{
  padding:12px 22px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  box-shadow:0 0 15px rgba(0,255,255,0.6);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,255,255,1);
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero span{
  color:#00f7ff;
}

/* ================= SECTION ================= */
section{
  padding:30px 20px;
  display:none;
}

#produk{
  display:block;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
}

.price{
  color:#00f7ff;
  margin:10px 0;
  font-weight:bold;
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00f7ff;
  margin-bottom:15px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.5);
  color:white;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
  <div class="loader-box">
    <div class="loader-circle"></div>
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h3>Naruya Store</h3>
  </div>
</header>

<section id="produk">

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

</section>

<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>

    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="number" id="total" readonly>

    <button onclick="kirim()">Kirim Bukti</button>
  </div>
</section>

<script>

/* LOADER HILANG 2 DETIK */
window.addEventListener("load", function(){
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },2000);
});

function beli(nama,harga){
  document.getElementById("produk").style.display="none";
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
