<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f0c29;color:#fff;overflow-x:hidden;transition:.3s}
.light{background:#f4f4f4;color:#111}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{width:40px;height:40px;border-radius:50%;box-shadow:0 0 15px cyan}

button{
padding:10px 16px;border:none;border-radius:10px;
cursor:pointer;font-weight:bold;
background:linear-gradient(90deg,#8f00ff,#00ffff);
color:white;transition:.2s
}
button:hover{transform:translateY(-3px)}

.hero{text-align:center;margin-top:50px}
.hero h1{text-shadow:0 0 20px cyan}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;padding:30px
}

.card{
background:rgba(255,255,255,.08);
padding:20px;border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,255,255,.3);
transition:.2s
}
.card:hover{transform:translateY(-5px)}

.price{color:cyan;margin:10px 0}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center
}

.modal-box{
background:#111;padding:25px;border-radius:15px;
width:90%;max-width:400px
}

input,select{
width:100%;padding:10px;margin-bottom:10px;
border-radius:8px;border:none
}

.progress{
height:8px;background:#333;border-radius:10px;
overflow:hidden;margin-bottom:10px
}
.bar{height:100%;background:cyan;width:100%}

.toast{
position:fixed;bottom:20px;right:20px;
background:#111;padding:15px 20px;
border-radius:10px;display:none;
box-shadow:0 0 20px cyan
}

.admin{
display:none;padding:20px
}

.order{
background:#222;padding:10px;margin-bottom:10px;border-radius:8px
}

.toggle-theme{
background:#222
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.jpg">
<h2>Naruya Store</h2>
</div>
<div>
<button onclick="openAdmin()">Admin</button>
<button class="toggle-theme" onclick="toggleTheme()">Mode</button>
</div>
</header>

<div class="hero">
<h1>Naruya Store Ultimate</h1>
<p>Premium Digital Service</p>
</div>

<div class="products">
<div class="card">
<h3>Panel Pterodactyl</h3>
<div class="price">Rp 7.000</div>
<button onclick="openModal('Panel Pterodactyl',7000)">Beli</button>
</div>

<div class="card">
<h3>Jasa Pasang Bot</h3>
<div class="price">Rp 5.000</div>
<button onclick="openModal('Jasa Pasang Bot',5000)">Beli</button>
</div>

<div class="card">
<h3>Nokos Indo</h3>
<div class="price">Rp 4.000</div>
<button onclick="openModal('Nokos Indo',4000)">Beli</button>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="mKategori"></h3>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="timer">300</div>

<input type="text" id="nama" placeholder="Nama Pengirim">
<select id="currency">
<option value="IDR">IDR</option>
<option value="USD">USD</option>
</select>
<input type="text" id="total" readonly>
<input type="file" id="bukti">

<button onclick="kirim()">Kirim Bukti</button>
<button onclick="closeModal()">Batal</button>
</div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
<h2>Dashboard Admin</h2>
<p>Total Order: <span id="totalOrder">0</span></p>
<p>Total Pendapatan: Rp <span id="totalIncome">0</span></p>
<hr style="margin:15px 0">
<div id="orderList"></div>
<button onclick="logout()">Logout</button>
</div>

<div class="toast" id="toast"></div>

<script>

let selectedPrice=0;
let waktu=300,interval;

function openModal(nama,harga){
selectedPrice=harga;
document.getElementById("modal").style.display="flex";
document.getElementById("mKategori").innerText=nama;
document.getElementById("total").value=new Intl.NumberFormat('id-ID').format(harga);
startTimer();
}

function closeModal(){
document.getElementById("modal").style.display="none";
clearInterval(interval);
}

function startTimer(){
waktu=300;
clearInterval(interval);
interval=setInterval(()=>{
waktu--;
document.getElementById("timer").innerText="QR: "+waktu+" detik";
document.getElementById("bar").style.width=(waktu/300*100)+"%";
if(waktu<=0){
clearInterval(interval);
showToast("QR Kadaluarsa");
}
},1000);
}

document.getElementById("currency").addEventListener("change",function(){
if(this.value==="USD"){
document.getElementById("total").value=(selectedPrice/15000).toFixed(2);
}else{
document.getElementById("total").value=new Intl.NumberFormat('id-ID').format(selectedPrice);
}
});

function kirim(){
let nama=document.getElementById("nama").value;
if(!nama){showToast("Isi nama dulu!");return;}

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push({nama:nama,produk:document.getElementById("mKategori").innerText,harga:selectedPrice});
localStorage.setItem("orders",JSON.stringify(orders));

showToast("Order tersimpan!");
closeModal();
}

function showToast(text){
let t=document.getElementById("toast");
t.innerText=text;
t.style.display="block";
setTimeout(()=>{t.style.display="none"},2500);
}

function openAdmin(){
let pass=prompt("Masukkan password admin:");
if(pass==="admin123"){
document.getElementById("adminPanel").style.display="block";
loadOrders();
}else{
showToast("Password salah!");
}
}

function logout(){
document.getElementById("adminPanel").style.display="none";
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
document.getElementById("totalOrder").innerText=orders.length;

let total=0;
let html="";
orders.forEach(o=>{
total+=o.harga;
html+=`<div class="order">${o.nama} - ${o.produk} - Rp ${o.harga}</div>`;
});
document.getElementById("orderList").innerHTML=html;
document.getElementById("totalIncome").innerText=new Intl.NumberFormat('id-ID').format(total);
}

function toggleTheme(){
document.body.classList.toggle("light");
}

</script>
</body>
</html>
