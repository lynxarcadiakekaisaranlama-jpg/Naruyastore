<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Naruya Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:center;
  padding:20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  font-weight:700;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:42px;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  opacity:0.7;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  padding:25px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.04);
  border-radius:25px;
  padding:25px;
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
}

/* PRICE */
.price{
  color:#38bdf8;
  margin:12px 0;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background: linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  cursor:pointer;
}

/* LOADING */
.loading{
  display:none;
  text-align:center;
}

.loader{
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
  🚀 Naruya Store
</header>

<section class="hero">
  <h1>Naruya Digital Store</h1>
  <p>Fast • Secure • Auto Delivery ⚡</p>
</section>

<div class="grid">

  <div class="card">
    <h3>Panel 1GB</h3>
    <div class="price">Rp5.000</div>
    <button class="btn" onclick="beli('Panel 1GB')">Beli</button>
  </div>

  <div class="card">
    <h3>Panel 2GB</h3>
    <div class="price">Rp8.000</div>
    <button class="btn" onclick="beli('Panel 2GB')">Beli</button>
  </div>

  <div class="card">
    <h3>Script Premium</h3>
    <div class="price">Rp15.000</div>
    <button class="btn" onclick="beli('Script')">Beli</button>
  </div>

</div>

<div class="loading" id="loading">
  <div class="loader"></div>
  <p>Memproses pembayaran...</p>
</div>

<footer>
  © 2026 Naruya Market
</footer>

<script>
async function beli(product){
  document.getElementById("loading").style.display="block";

  try{
    const res = await fetch("/api/payment", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ product })
    });

    const data = await res.json();
    window.open(data.url, "_blank");

  }catch(err){
    alert("Error!");
  }

  document.getElementById("loading").style.display="none";
}
</script>

</body>
</html>
