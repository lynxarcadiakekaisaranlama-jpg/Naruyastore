<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruya Store</title>
  <meta name="description" content="Platform digital terpercaya, cepat, aman, harga terjangkau.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      color: white;
      overflow-x: hidden;
      background-color: #15152b;
    }

    /* VIDEO BACKGROUND */
    video.bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.4) contrast(1.1);
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      padding: 20px;
      background-color: rgba(21,21,43,0.8);
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid #00f7ff;
    }

    .logo h2 {
      color: #00f7ff;
      font-size: 1.5rem;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 40px 20px;
      margin-top: 20px;
      position: relative;
      z-index: 5;
    }

    .hero h1 {
      font-size: 2.2rem;
      text-shadow: 0 0 10px #00f7ff;
      margin-bottom: 10px;
    }

    .hero p {
      margin-bottom: 20px;
    }

    .main-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg,#6f00ff,#00f7ff);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 5px;
    }

    .main-btn:hover {
      box-shadow: 0 0 15px #00f7ff;
    }

    /* PROFILE */
    #profile {
      display: none;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      position: relative;
      z-index: 5;
    }

    .profile-card {
      background: #15152b;
      padding: 25px;
      border-radius: 15px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,247,255,0.2);
      border: 1px solid #00f7ff;
    }

    .profile-card h3 {
      color: #00f7ff;
      margin-bottom: 15px;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg,#6f00ff,#00f7ff);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      box-shadow: 0 0 15px #00f7ff;
    }

    /* PRODUK */
    .products {
      padding: 20px;
      margin-top: 20px;
      position: relative;
      z-index: 5;
    }

    .card {
      background: #15152b;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0,247,255,0.1);
      text-align: center;
      border: 1px solid #00f7ff;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .price {
      color: #00f7ff;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .buy-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: #6f00ff;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .buy-btn:hover {
      background: #8a2be2;
    }
  </style>
</head>
<body>

<!-- VIDEO & OVERLAY -->
<video class="bg" autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">
    <img src="logo.jpg" alt="Logo Naruya Store">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo.jpg" alt="Logo PP">
    <h2>Naruya Store</h2>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Naruya Store Official</h1>
  <p>Platform digital terpercaya, cepat, aman, harga terjangkau.</p>
  <button class="main-btn" onclick="toggleProfile()">Profile</button>
  <button class="main-btn" onclick="toggleProduk()">Lihat Produk</button>
</section>

<!-- PROFILE -->
<section id="profile">
  <div class="profile-card">
    <h3>Naruya Store</h3>
    <button class="social-btn" onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button class="social-btn" onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
    <button class="social-btn" onclick="window.open('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button class="social-btn" onclick="window.open('https://tiktok.com/@narayu.kiyora')">TikTok</button>
    <button class="social-btn" onclick="window.open('https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R')">Saluran WhatsApp</button>
  </div>
</section>

<!-- PRODUK -->
<section class="products" id="produk" style="display:none;">
  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy-btn" onclick="kirim('Jasa Pasang Bot')">Beli</button>
  </div>
  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy-btn" onclick="kirim('Nokos Indo')">Beli</button>
  </div>
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy-btn" onclick="kirim('Panel Pterodactyl')">Beli</button>
  </div>
</section>

<script>
window.addEventListener("load", function(){
  setTimeout(()=>{ document.getElementById("loader").style.display="none"; },2000);
});

function toggleProfile(){
  let p = document.getElementById("profile");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function toggleProduk(){
  let produk = document.getElementById("produk");
  produk.style.display = (produk.style.display === "block") ? "none" : "block";
  produk.scrollIntoView({behavior:"smooth"});
}

function kirim(produk){
  let namaUser = prompt("Masukkan Nama Anda:");
  if(!namaUser){ alert("Isi nama dulu!"); return; }
  let pesan = "Halo Admin, saya sudah melakukan pembayaran dan ingin mengkonfirmasi pesanan.\n\n📦 Produk: " 
              + produk + "\n👤 Nama: " + namaUser + "\n✅Status: Belum diterima / silakan cek transfer";
  window.location.href = "https://t.me/Narayuizumi?text=" + encodeURIComponent(pesan);
}
</script>

</body>
</html>
