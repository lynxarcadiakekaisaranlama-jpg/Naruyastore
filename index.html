<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:url('anime.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
  position:relative;
  overflow-x:hidden;
}

/* overlay gelap biar teks kebaca */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(10,15,30,0.75);
  backdrop-filter:blur(3px);
  z-index:-1;
}

/* efek bintang */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#00f7ff 1px, transparent 1px),
    radial-gradient(#8f00ff 1px, transparent 1px);
  background-size:60px 60px, 100px 100px, 140px 140px;
  opacity:0.15;
  animation:starMove 20s linear infinite;
}

@keyframes starMove{
  from{background-position:0 0,0 0,0 0;}
  to{background-position:200px 400px,300px 200px,400px 300px;}
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00f7ff;
  box-shadow:0 0 15px #00f7ff;
}

.logo h1{
  font-size:22px;
  margin:0;
}

.open-btn{
  padding:10px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(45deg,#00f7ff,#8f00ff);
  box-shadow:0 0 15px rgba(0,255,255,0.6);
  transition:0.3s;
}

.open-btn:hover{
  transform:scale(1.05);
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h2{
  font-size:28px;
  margin:10px 0;
}

.hero span{
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

.products{
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 25px rgba(0,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 30px rgba(0,255,255,0.3);
}

.card h3{
  margin:0;
  font-size:20px;
}

.price{
  margin:10px 0;
  color:#00f7ff;
  font-weight:bold;
  text-shadow:0 0 10px #00f7ff;
}

.buy{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  box-shadow:0 0 15px rgba(0,255,255,0.5);
  transition:0.3s;
}

.buy:hover{
  transform:scale(1.05);
}

.payment{
  display:none;
  padding:20px;
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

.timer{
  color:#00f7ff;
  font-weight:bold;
  margin-bottom:20px;
  text-shadow:0 0 10px #00f7ff;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  backdrop-filter:blur(8px);
}

.btn-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn-kirim,
.btn-cek{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  transition:0.3s;
}

.btn-kirim{
  background:linear-gradient(45deg,#00f7ff,#8f00ff);
  box-shadow:0 0 15px rgba(0,255,255,0.5);
}

.btn-cek{
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  box-shadow:0 0 15px rgba(143,0,255,0.5);
}

.btn-kirim:hover,
.btn-cek:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h1>Naruya Store</h1>
  </div>
  <button class="open-btn" onclick="scrollToProduk()">Buka Pesanan</button>
</header>

<section class="hero">
  <h2>Solusi Digital Store <br><span>nikmati berbagai layanan premium</span></h2>
</section>

<section class="products" id="produk">

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy" onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy" onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>SC Bot Nokos</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('SC Bot Nokos',5000)">Beli</button>
  </div>

</section>

<section class="payment" id="payment">

  <img src="roro.jpg">

  <div class="timer" id="timer">QR berlaku: 300 detik</div>

  <h3>Form Konfirmasi</h3>

  <input type="text" id="kategori" readonly>
  <input type="text" id="nama" placeholder="Nama Pengirim">
  <select id="matauang">
    <option>IDR</option>
    <option>USD</option>
  </select>
  <input type="number" id="total" readonly>

  <div class="btn-group">
    <button class="btn-kirim" onclick="kirim()">Kirim Bukti</button>
    <button class="btn-cek" onclick="cek()">Cek Pembayaran</button>
  </div>

</section>

<script>
function scrollToProduk(){
  document.getElementById("produk").scrollIntoView({behavior:"smooth"});
}

function beli(nama,harga){
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
  document.getElementById("payment").scrollIntoView({behavior:"smooth"});
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(function(){
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa, refresh halaman.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let matauang=document.getElementById("matauang").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💰 "+matauang+"\n"+
  "💵 "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}

function cek(){
  alert("Pembayaran sedang diverifikasi admin.\nMohon tunggu ya.");
}
</script>

</body>
</html>
