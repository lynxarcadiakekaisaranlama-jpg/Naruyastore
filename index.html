<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
  min-height:100vh;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 25px;
  border-bottom:1px solid #1e293b;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:38px;
  height:38px;
  border-radius:50%;
}

button{
  padding:9px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  background:#06b6d4;
  color:#fff;
  transition:.2s;
}

button:hover{
  opacity:.85;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px 10px;
}

.hero h1{
  font-size:26px;
  margin-bottom:6px;
}

/* PRODUCT GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.price{
  color:#06b6d4;
  margin:10px 0;
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  justify-content:center;
  align-items:center;
  padding:15px;
  overflow-y:auto;
  z-index:9999;
}

.modal-box{
  background:#1e293b;
  width:100%;
  max-width:420px;
  border-radius:14px;
  padding:20px;
  max-height:95vh;
  overflow-y:auto;
}

.qr{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.timer{
  font-size:13px;
  margin-bottom:8px;
}

.progress{
  height:6px;
  background:#334155;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:15px;
}

.progress-bar{
  height:100%;
  width:100%;
  background:#06b6d4;
  transition:1s linear;
}

input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  margin-bottom:10px;
}

.preview{
  width:100%;
  border-radius:8px;
  margin-bottom:10px;
  display:none;
}

.button-group{
  display:flex;
  gap:10px;
}

.button-group button{
  flex:1;
}

.secondary{
  background:#334155;
}

/* ADMIN */
.admin{
  display:none;
  padding:25px;
}

.order{
  background:#1e293b;
  padding:10px;
  border-radius:6px;
  margin-bottom:8px;
  font-size:14px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1e293b;
  padding:12px 18px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <button onclick="openAdmin()">Admin</button>
</header>

<div class="hero">
  <h1>Naruya Store</h1>
  <p>Digital Service Fast & Trusted</p>
</div>

<div class="products">
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="openModal('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="openModal('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="openModal('Nokos Indo',4000)">Beli</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <img src="roro.jpg" class="qr">

    <div class="timer" id="timer">QR berlaku: 300 detik</div>
    <div class="progress">
      <div class="progress-bar" id="bar"></div>
    </div>

    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="text" id="total" readonly>
    <input type="file" id="bukti" accept="image/*">
    <img id="preview" class="preview">

    <div class="button-group">
      <button onclick="kirim()">Kirim</button>
      <button onclick="closeModal()" class="secondary">Batal</button>
    </div>

  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="adminPanel">
  <h2>Dashboard Admin</h2>
  <p>Total Order: <span id="totalOrder">0</span></p>
  <p>Total Pendapatan: Rp <span id="totalIncome">0</span></p>
  <hr style="margin:15px 0">
  <div id="orderList"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let selectedPrice=0;
let waktu=300;
let interval;

function openModal(nama,harga){
  selectedPrice=harga;
  document.getElementById("modal").style.display="flex";
  document.getElementById("total").value="Rp "+new Intl.NumberFormat('id-ID').format(harga);
  startTimer();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  clearInterval(interval);
}

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    document.getElementById("bar").style.width=(waktu/300*100)+"%";
    if(waktu<=0){
      clearInterval(interval);
      showToast("QR Kadaluarsa");
    }
  },1000);
}

document.getElementById("bukti").addEventListener("change",function(){
  let file=this.files[0];
  if(file){
    let reader=new FileReader();
    reader.onload=function(e){
      let img=document.getElementById("preview");
      img.src=e.target.result;
      img.style.display="block";
    };
    reader.readAsDataURL(file);
  }
});

function kirim(){
  let nama=document.getElementById("nama").value;
  if(!nama){showToast("Isi nama dulu!");return;}

  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  orders.push({nama:nama,harga:selectedPrice});
  localStorage.setItem("orders",JSON.stringify(orders));

  showToast("Order tersimpan");
  closeModal();
}

function openAdmin(){
  let pass=prompt("Password Admin:");
  if(pass==="admin123"){
    document.getElementById("adminPanel").style.display="block";
    loadOrders();
  }else{
    showToast("Password salah");
  }
}

function loadOrders(){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  document.getElementById("totalOrder").innerText=orders.length;
  let total=0;
  let html="";
  orders.forEach(o=>{
    total+=o.harga;
    html+=`<div class="order">${o.nama} - Rp ${o.harga}</div>`;
  });
  document.getElementById("orderList").innerHTML=html;
  document.getElementById("totalIncome").innerText=new Intl.NumberFormat('id-ID').format(total);
}

function showToast(text){
  let t=document.getElementById("toast");
  t.innerText=text;
  t.style.display="block";
  setTimeout(()=>{t.style.display="none"},2500);
}

</script>

</body>
</html>
