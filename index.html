<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>
<style>
/* Reset & Base */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#111;color:white;overflow-x:hidden;transition:0.3s;}
body.light{background:#f5f5f5;color:#222;}
a{cursor:pointer;text-decoration:none;}

/* Loader */
#loader{position:fixed;width:100%;height:100%;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;justify-content:center;align-items:center;z-index:9999;transition:0.3s;}
.loader-box{display:flex;align-items:center;gap:15px;padding:25px 35px;border-radius:20px;border:2px solid #00ffff;box-shadow:0 0 40px #00ffff;animation:loaderAnim 1.5s infinite alternate;}
.loader-box img{width:80px;height:80px;border-radius:50%;border:3px solid #00ffff;object-fit:cover;}
.loader-text{font-size:20px;font-weight:bold;color:#00ffff;text-shadow:0 0 15px #00ffff;}
@keyframes loaderAnim{0%{transform:scale(1);}100%{transform:scale(1.05);}}

/* Video Background & overlay */
video.bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(1.4) contrast(1.1);transition:0.5s;}
.overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:-1;transition:0.5s;}
body.light .overlay{background:rgba(255,255,255,0.1);}

/* Floating particles */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-3;pointer-events:none;}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:linear-gradient(90deg,#8f00ff,#00ffff);position:sticky;top:0;z-index:1000;border-radius:0 0 15px 15px;box-shadow:0 0 15px rgba(0,0,0,0.5);}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:45px;height:45px;border-radius:50%;border:2px solid #00ffff;}
.logo h2{text-shadow:0 0 10px #00ffff;}
.menu-btn{font-size:1.5rem;cursor:pointer;background:none;border:none;color:white;transition:0.2s;}
.menu-btn:hover{opacity:0.85;}

/* Side Menu Multi-level */
nav{position:fixed;top:0;right:-280px;width:280px;height:100%;background:#222;padding:60px 20px;display:flex;flex-direction:column;gap:15px;transition:right 0.3s;z-index:999;}
nav a{color:white;font-size:1.2rem;transition:0.2s;}
nav a:hover{color:#ffeb3b;}
nav .submenu{display:none;flex-direction:column;margin-left:15px;gap:10px;}
nav a.activeSub{display:flex;flex-direction:column;}
nav.active{right:0;}

/* Hero cinematic */
.hero{text-align:center;margin-top:80px;opacity:0;transform:translateY(30px);transition:0.6s;}
.hero.visible{opacity:1;transform:translateY(0);}
.hero h1{font-size:2.5rem;text-shadow:0 0 15px #00ffff;}
.hero p{margin-top:12px;opacity:0.9;line-height:1.6;font-size:1.1rem;}
.hero .subtitle{height:24px;margin-top:10px;font-size:1rem;color:#00ffff;text-shadow:0 0 10px #00ffff;}
.hero button{margin-top:20px;padding:14px 28px;border:none;border-radius:10px;background:linear-gradient(90deg,#8f00ff,#00ffff);color:white;font-weight:bold;cursor:pointer;transition:0.3s;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

/* Sections & scroll animations */
section{display:none;padding:30px 20px;opacity:0;transform:translateY(20px);transition:0.5s;}
section.active{display:block;opacity:1;transform:translateY(0);}

/* Profile Card 3D Hover */
.profile-card{background:rgba(0,0,0,0.7);padding:40px 25px;border-radius:25px;margin:20px;text-align:center;border:2px solid #00ffff;box-shadow:0 0 50px rgba(0,255,255,0.7);backdrop-filter:blur(15px);transition:transform 0.3s,box-shadow 0.3s;}
.profile-card:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 0 60px rgba(0,255,255,0.9);}
.profile-img{width:150px;height:150px;border-radius:50%;margin:auto;border:5px solid #00ffff;object-fit:cover;}
.profile-card h2{margin-top:20px;font-size:26px;}
.profile-card p{margin:10px 0 25px;opacity:0.8;}
.social-btn{width:100%;margin-bottom:15px;padding:12px;background:#00ffff;color:#111;font-weight:bold;border:none;border-radius:10px;cursor:pointer;transition:0.2s;}
.social-btn:hover{opacity:0.9;transform:scale(1.05);}

/* Product Card 3D Hover */
.card{background:rgba(0,0,0,0.6);padding:25px;border-radius:20px;margin-bottom:25px;border:1px solid rgba(0,255,255,0.4);box-shadow:0 0 25px rgba(0,255,255,0.3);opacity:0;transform:translateY(20px);transition:0.5s,transform 0.3s;}
.card.visible{opacity:1;transform:translateY(0);}
.card:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 0 40px rgba(0,255,255,0.5);}
.price{color:#00ffff;margin:10px 0;font-weight:bold;}
.card button{padding:12px 20px;background:#00ffff;color:#111;border:none;border-radius:10px;font-weight:bold;cursor:pointer;transition:0.2s;}
.card button:hover{opacity:0.9;transform:scale(1.05);}

/* Payment Section */
.payment img{width:100%;border-radius:15px;margin-bottom:15px;}
.timer{color:#00ffff;margin-bottom:10px;font-weight:bold;}
.progress-bar{width:100%;height:12px;background:rgba(255,255,255,0.2);border-radius:6px;margin-bottom:15px;overflow:hidden;}
.progress-bar-inner{width:100%;height:100%;background:linear-gradient(90deg,#8f00ff,#00ffff);transition:width 1s linear;border-radius:6px;}
input,select{width:100%;padding:14px;margin-bottom:15px;border-radius:10px;border:none;background:rgba(255,255,255,0.15);color:white;box-shadow:0 0 15px #00ffff;}
.payment-buttons{display:flex;gap:10px;}
.payment-buttons button{flex:1;padding:12px;background:#00ffff;color:#111;border:none;border-radius:10px;font-weight:bold;cursor:pointer;transition:0.2s;}
.payment-buttons button:hover{opacity:0.9;transform:scale(1.05);}

/* Dark Mode Toggle */
#darkToggle{position:fixed;bottom:20px;right:20px;padding:12px;background:#00ffff;color:#111;border-radius:50%;cursor:pointer;font-size:1.2rem;box-shadow:0 0 15px #00ffff;transition:0.3s;}
#darkToggle:hover{opacity:0.85;transform:scale(1.1);}

/* Confetti container */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-box">
    <img src="loading.jpg" alt="Loading">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<!-- Particles Background -->
<canvas id="particles"></canvas>

<!-- Confetti Container -->
<canvas id="confetti"></canvas>

<!-- Video Background -->
<video class="bg" autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Header -->
<header>
  <div class="logo">
    <img src="logo.jpg" alt="Logo">
    <h2>Naruya Store</h2>
  </div>
  <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
</header>

<!-- Side Menu -->
<nav id="sideMenu">
  <a onclick="showSection('profile')">Profile</a>
  <a onclick="showSection('produk')">Produk</a>
  <a onclick="showSection('payment')">Payment</a>
</nav>

<!-- Hero -->
<div class="hero" id="hero">
  <h1>Naruya Store Official</h1>
  <div class="subtitle" id="subtitle"></div>
  <button onclick="showSection('produk')">Lihat Produk</button>
</div>

<!-- Profile Section -->
<section id="profile">
  <div class="profile-card">
    <img src="logo.jpg" class="profile-img" alt="Profile">
    <h2>Naruya Store</h2>
    <p>Store digital terpercaya.</p>
    <button class="social-btn" onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
    <button class="social-btn" onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button class="social-btn" onclick="window.open('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button class="social-btn" onclick="window.open('https://tiktok.com/@narayu.kiyora')">TikTok</button>
  </div>
</section>

<!-- Product Section -->
<section id="produk">
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>
  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>
</section>

<!-- Payment Section -->
<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg" alt="QRIS">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>
    <div class="progress-bar"><div class="progress-bar-inner" id="progressBar"></div></div>
    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <select id="currency">
      <option value="IDR">IDR (Rupiah)</option>
      <option value="USD">USD (Dollar)</option>
    </select>
    <input type="number" id="total" readonly>
    <input type="number" id="openAmount" placeholder="Masukkan Nominal Sendiri">
    <div class="payment-buttons">
      <button onclick="kirim()">Kirim Bukti</button>
      <button onclick="cekPembayaran()">Cek Pembayaran</button>
    </div>
  </div>
</section>

<!-- Dark Mode Toggle -->
<div id="darkToggle" onclick="toggleDark()">🌓</div>

<script>
// Loader
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    document.getElementById('hero').classList.add('visible');
    animateCards();
    typeSubtitle("Selamat datang di Naruya Store! Platform digital terpercaya.");
    initParticles();
  },1500);
});

// Menu Toggle
function toggleMenu(){document.getElementById('sideMenu').classList.toggle('active');}

// Show Section
function hideAll(){document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.card').forEach(c=>c.classList.remove('visible'));}
function showSection(id){
  hideAll();
  document.getElementById(id).classList.add('active');
  document.getElementById('sideMenu').classList.remove('active');
  animateCards();
  smoothScrollTo(document.getElementById(id));
}

// Animate Cards
function animateCards(){
  const cards = document.querySelectorAll('.card');
  cards.forEach((c,i)=>setTimeout(()=>{c.classList.add('visible');},i*200));
}

// Smooth Scroll
function smoothScrollTo(el){
  window.scrollTo({top:el.offsetTop-70,behavior:'smooth'});
}

// Dark Mode
function toggleDark(){document.body.classList.toggle('light');}

// QR Timer with Progress Bar
let waktu=300, interval;
function startTimer(){
  waktu=300; clearInterval(interval);
  const progress=document.getElementById('progressBar');
  interval=setInterval(()=>{
    waktu--;
    document.getElementById('timer').innerText='QR berlaku: '+waktu+' detik';
    progress.style.width=(waktu/300*100)+'%';
    if(waktu<=0){clearInterval(interval);alert('QR kadaluarsa.'); progress.style.width='0%';}
  },1000);
}

// Beli Produk
function beli(nama,harga){
  showSection('payment');
  document.getElementById('kategori').value=nama;
  document.getElementById('total').value=harga;
  document.getElementById('openAmount').value='';
  startTimer();
}

// Kirim Bukti
function kirim(){
  let kategori=document.getElementById('kategori').value;
  let nama=document.getElementById('nama').value;
  let currency=document.getElementById('currency').value;
  let openAmount=document.getElementById('openAmount').value;
  let total=document.getElementById('total').value;
  let finalAmount=openAmount?openAmount:total;
  if(!nama){alert('Isi nama dulu!');return;}
  if(!finalAmount){alert('Nominal tidak boleh kosong!');return;}
  let pesan='Halo Admin, saya sudah bayar.\n\n📦 '+kategori+'\n👤 '+nama+'\n💵 '+currency+' '+finalAmount;
  window.location.href='https://t.me/Narayuizumi?text='+encodeURIComponent(pesan);
  confetti(); // trigger confetti
}

// Cek Pembayaran
function cekPembayaran(){alert('Sistem sedang memverifikasi pembayaran Anda. Mohon tunggu beberapa saat.');setTimeout(()=>{alert('Pembayaran belum terdeteksi atau masih dalam proses pengecekan.');},2000);}

// Subtitle typing
function typeSubtitle(text){
  const el=document.getElementById('subtitle');
  let i=0;
  function type(){if(i<text.length){el.innerHTML+=text.charAt(i);i++;setTimeout(type,50);}}
  type();
}

// Particles background
function initParticles(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let particles=[];
  for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5});}
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,255,0.7)';
      ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.x>canvas.width||p.x<0)p.dx*=-1;
      if(p.y>canvas.height||p.y<0)p.dy*=-1;
    });
    requestAnimationFrame(animate);
  }
  animate();
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
}

// Confetti
function confetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let confs=[];
  for(let i=0;i<150;i++){
    confs.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+4,dx:(Math.random()-0.5)*5,dy:(Math.random()-0.5)*5,color:`hsl(${Math.random()*360},100%,50%)`});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confs.forEach(c=>{
      ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill();
      c.x+=c.dx;c.y
