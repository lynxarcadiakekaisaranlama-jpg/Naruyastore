<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f1a;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.profile-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.profile-box img{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00f7ff;
  box-shadow:0 0 15px #00f7ff;
}

.btn{
  padding:10px 18px;
  background:linear-gradient(45deg,#7b00ff,#00f7ff);
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.card{
  background:#111827;
  margin:20px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,247,255,0.2);
}

.price{
  color:#00f7ff;
  font-size:20px;
  margin:10px 0;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

.qr-box{
  text-align:center;
}

#timer{
  color:#00f7ff;
  margin-top:10px;
  font-weight:bold;
}

.verify{
  display:none;
  text-align:center;
  padding:20px;
  color:#00f7ff;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="profile-box">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <a href="#store" class="btn">Buka Pesanan</a>
</header>

<section class="hero">
  <h1>Solusi Digital Store</h1>
  <p>Layanan bot, nokos, dan panel murah & terpercaya.</p>
  <a href="#store" class="btn">Lihat Produk</a>
</section>

<section id="store">
  <div class="card">
    <h2>Jasa Pasang Bot</h2>
    <div class="price">Rp 5.000</div>
    <button class="btn" onclick="pilihProduk('Jasa Pasang Bot','5000')">Beli</button>
  </div>

  <div class="card">
    <h2>Nokos Indo</h2>
    <div class="price">Rp 4.000</div>
    <button class="btn" onclick="pilihProduk('Nokos Indo','4000')">Beli</button>
  </div>

  <div class="card">
    <h2>Panel Pterodactyl</h2>
    <div class="price">Rp 7.000</div>
    <button class="btn" onclick="pilihProduk('Panel Pterodactyl','7000')">Beli</button>
  </div>

  <div class="card">
    <h2>SC Bot Nokos</h2>
    <div class="price">Rp 5.000</div>
    <button class="btn" onclick="pilihProduk('SC Bot Nokos','5000')">Beli</button>
  </div>
</section>

<section id="payment" class="card" style="display:none;">
  <h2>Payment QRIS</h2>

  <div class="qr-box">
    <img src="roro.jpg" width="200">
    <div id="timer"></div>
  </div>

  <h3>Form Konfirmasi</h3>

  <form onsubmit="kirimBukti(event)">
    <input type="text" id="kategori" placeholder="Kategori Produk" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="text" id="matauang" value="IDR" readonly>
    <input type="text" id="total" placeholder="Total" readonly>
    <button class="btn" type="submit">Kirim Bukti</button>
  </form>

  <button class="btn" onclick="cekPembayaran()">Cek Pembayaran</button>

  <div class="verify" id="verifikasi">
    Sedang memverifikasi pembayaran...
  </div>

</section>

<script>
let waktu = 300;

function startTimer(){
  let timer = setInterval(function(){
    if(waktu <= 0){
      clearInterval(timer);
      document.getElementById("timer").innerHTML = "QR expired";
      return;
    }
    document.getElementById("timer").innerHTML = 
      "QR berlaku: " + waktu + " detik";
    waktu--;
  },1000);
}

function pilihProduk(nama, harga){
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  window.location="#payment";
  waktu=300;
  startTimer();
}

function kirimBukti(e){
  e.preventDefault();

  let kategori = document.getElementById("kategori").value;
  let nama = document.getElementById("nama").value;
  let matauang = document.getElementById("matauang").value;
  let total = document.getElementById("total").value;

  if(!kategori || !nama || !matauang || !total){
    alert("Lengkapi semua data dulu!");
    return;
  }

  let pesan = 
  "Halo Admin, saya sudah bayar.\n\n" +
  "📦 Kategori: " + kategori + "\n" +
  "👤 Nama: " + nama + "\n" +
  "💰 Mata Uang: " + matauang + "\n" +
  "💵 Total: " + total;

  window.location.href = 
  "https://t.me/Narayuizumi?text=" + encodeURIComponent(pesan);
}

function cekPembayaran(){
  document.getElementById("verifikasi").style.display="block";
  setTimeout(function(){
    alert("Pembayaran sedang diproses admin.");
  },3000);
}
</script>

</body>
</html>
