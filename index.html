<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('anime.jpg') no-repeat center center fixed;
  background-size: cover;
  color:white;
  text-align:center;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  z-index:-1;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:350px;
  margin:20px auto;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
  background:linear-gradient(45deg,#4facfe,#00f2fe);
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  font-size:15px;
  width:100%;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

#qrSection{
  display:none;
  margin-top:20px;
}

#timer{
  color:#ff4d4d;
  font-size:18px;
  margin-top:10px;
}
</style>
<body>

<h2>Naruya</h2>

<!-- PRODUK 1 -->
<div class="card">
  <h3>Nokos Indonesia</h3>
  <p>Harga: Rp 10.000</p>
  <button onclick="beli('Nokos Indonesia',10000)">Beli</button>
</div>

<!-- PRODUK 2 -->
<div class="card">
  <h3>Sewa Bot 3 Bulan</h3>
  <p>Harga: Rp 50.000</p>
  <button onclick="beli('Sewa Bot 3 Bulan',50000)">Beli</button>
</div>

<!-- PRODUK 3 -->
<div class="card">
  <h3>Jasa Pasang Bot WA</h3>
  <p>Harga: Rp 5.000</p>
  <button onclick="beli('Jasa Pasang Bot WA',15000)">Beli</button>
</div>

<!-- QR SECTION -->
<div class="card" id="qrSection">
  <h3 id="produkDipilih"></h3>
  <p id="hargaDipilih"></p>

  <h4>Scan QRIS</h4>
<img id="qris" width="260" style="display:block; margin:auto; border-radius:15px;">

  <div id="timer">Waktu: 05:00</div>
  <p id="status"></p>
</div>


<script>
let waktu = 300;
let hitung;

function beli(nama,harga){

  document.getElementById("qrSection").style.display = "block";
  document.getElementById("produkDipilih").innerHTML = nama;
  document.getElementById("hargaDipilih").innerHTML = "Total: Rp " + harga;
  document.getElementById("status").innerHTML = "";

  fetch("https://api.pakasir.com/create-transaction", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer API_KEY_KAMU"
    },
    body: JSON.stringify({
      amount: harga,
      reference: "INV-" + Date.now(),
      customer_name: "Skyzo"
    })
  })
  .then(res => res.json())
  .then(data => {

    // ambil qr dari pakasir
    document.getElementById("qris").src = data.qr_url;

    waktu = 300;
    startTimer();
  })
  .catch(err => {
    document.getElementById("status").innerHTML = "Gagal buat transaksi ❌";
  });
}

function startTimer(){
  clearInterval(hitung);
  hitung = setInterval(function(){
    let menit = Math.floor(waktu / 60);
    let detik = waktu % 60;

    if(detik < 10){
      detik = "0" + detik;
    }

    document.getElementById("timer").innerHTML =
      "Waktu: " + menit + ":" + detik;

    waktu--;

    if(waktu < 0){
      clearInterval(hitung);
      document.getElementById("timer").innerHTML = "Waktu Habis!";
      document.getElementById("status").innerHTML =
        "QR Expired ❌ Silakan beli lagi.";
    }

  },1000);
}
</script>
</body>
</html>
