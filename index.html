<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:url('anime.jpg') no-repeat center center;
  background-size:cover;
  color:white;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
  border:3px solid #00f7ff;
  box-shadow:0 0 15px #00f7ff;
}

.open-btn{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#00f7ff,#8f00ff);
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero span{
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

.products{
  padding:20px;
}

.card{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.price{
  margin:10px 0;
  color:#00f7ff;
  font-weight:bold;
}

.buy{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
}

.payment{
  display:none;
  padding:20px;
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00f7ff;
  font-weight:bold;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:rgba(0,0,0,0.6);
  color:white;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#00f7ff,#8f00ff);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h1>Naruya Store</h1>
  </div>
  <button class="open-btn" onclick="scrollToProduk()">Buka Pesanan</button>
</header>

<section class="hero">
  <h2>Naruya Store Official <br>
  <span>Menyediakan berbagai kebutuhan digital terpercaya.</span></h2>
</section>

<section class="products" id="produk">

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy" onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy" onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

</section>

<section class="payment" id="payment">

  <img src="roro.jpg">

  <div class="timer" id="timer">QR berlaku: 300 detik</div>

  <h3>Form Konfirmasi</h3>

  <input type="text" id="kategori" readonly>
  <input type="text" id="nama" placeholder="Nama Pengirim">
  <input type="number" id="total" readonly>

  <button class="btn" onclick="kirim()">Kirim Bukti</button>

</section>

<script>

function scrollToProduk(){
  document.getElementById("produk")
  .scrollIntoView({behavior:"smooth"});
}

function beli(nama,harga){
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
  document.getElementById("payment")
  .scrollIntoView({behavior:"smooth"});
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);

  interval=setInterval(function(){
    waktu--;
    document.getElementById("timer")
    .innerText="QR berlaku: "+waktu+" detik";

    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa. Silakan beli ulang.");
      document.getElementById("payment").style.display="none";
    }

  },1000); // FIX jadi 1 detik
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 Rp "+total;

  window.location.href="https://t.me/Narayuizumi?text="+
  encodeURIComponent(pesan);
}

</script>

</body>
</html>
