<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>
<style>
/* Reset & Font */
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif;}
body {color:#fff; background:#15152b; overflow-x:hidden;}

/* Loader */
#loader {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  z-index:9999;
}
.loader-box {
  display:flex; gap:15px; align-items:center;
  padding:25px; border:2px solid #00f7ff; border-radius:15px;
  box-shadow:0 0 30px #00f7ff;
}
.loader-box img {
  width:80px; height:80px; border-radius:50%;
  border:2px solid #00f7ff; object-fit:cover;
}
.loader-text {color:#00f7ff; font-weight:bold; font-size:1.1rem;}

/* Video Background */
video.bg {
  position:fixed; inset:0; width:100%; height:100%;
  object-fit:cover; filter:brightness(1) contrast(1.1); z-index:-2;
}
.overlay {position:fixed; inset:0; background:rgba(0,0,0,0.2); z-index:-1;}

/* Header */
header {
  display:flex; justify-content:center; padding:20px;
  background:rgba(21,21,43,0.8); z-index:10; position:relative;
}
header .logo {display:flex; align-items:center; gap:10px;}
header .logo img {width:60px; height:60px; border-radius:50%; border:2px solid #00f7ff;}
header .logo h2 {color:#00f7ff; font-size:1.5rem;}

/* Profile Section */
#profile {display:none; text-align:center; padding:40px 20px;}
.profile-card {
  background:#15152b; padding:30px; border-radius:15px; max-width:300px;
  margin:0 auto; border:1px solid #00f7ff; box-shadow:0 0 20px rgba(0,247,255,0.2);
}
.profile-card img {width:100px; height:100px; border-radius:50%; border:2px solid #00f7ff; margin-bottom:15px;}
.profile-card h3 {color:#00f7ff; margin-bottom:10px; font-size:1.3rem;}
.profile-card p {margin-bottom:15px; font-size:1rem;}
.social-btn {
  width:100%; padding:12px; margin:6px 0;
  background:linear-gradient(45deg,#6f00ff,#00f7ff); color:#fff; font-size:1rem;
  border-radius:8px; cursor:pointer; transition:all .3s ease;
}
.social-btn:hover {box-shadow:0 0 15px #00f7ff;}

/* Payment Section */
#payment {display:none; text-align:center; padding:40px 20px;}
#payment h2 {margin-bottom:10px; text-shadow:0 0 10px #00f7ff;}
#payment p {margin-bottom:20px; font-size:1rem;}
#payment img {max-width:200px; border-radius:15px; margin-bottom:20px; border:2px solid #00f7ff;}
.main-btn {padding:10px 18px; background:linear-gradient(45deg,#6f00ff,#00f7ff); color:#fff; border:none; border-radius:8px; cursor:pointer; transition:all .3s ease;}
.main-btn:hover {box-shadow:0 0 15px #00f7ff;}

/* Hero */
.hero {text-align:center; padding:40px 20px; margin-top:20px;}
.hero h1 {font-size:2rem; text-shadow:0 0 10px #00f7ff; margin-bottom:10px;}
.hero p {margin-bottom:20px; font-size:1rem;}
</style>
</head>
<body>

<!-- Video Background -->
<video class="bg" autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Loader -->
<div id="loader">
  <div class="loader-box">
    <img src="logo.jpg" alt="Logo Naruya Store">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <img src="logo.jpg" alt="Logo">
    <h2>Naruya Store</h2>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <h1>Selamat Datang di Naruya Store</h1>
  <p>Platform digital terpercaya, cepat, aman, harga terjangkau.</p>
</section>

<!-- Profile -->
<section id="profile">
  <div class="profile-card">
    <img src="logo.jpg" alt="Profil PP">
    <h3>Naruya Store</h3>
    <p>Platform digital terpercaya.</p>
    <button class="social-btn" onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button class="social-btn" onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
    <button class="social-btn" onclick="window.open('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button class="social-btn" onclick="window.open('https://tiktok.com/@narayu.kiyora')">TikTok</button>
    <button class="social-btn" onclick="window.open('https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R')">Saluran WhatsApp</button>
  </div>
</section>

<!-- Payment -->
<section id="payment">
  <h2>Pembayaran Belum Diterima</h2>
  <p>Silakan scan QRIS di bawah dan lakukan transfer:</p>
  <img src="roro.jpg" alt="QRIS Pembayaran">
  <button class="main-btn" onclick="kirim()">Konfirmasi TF</button>
</section>

<script>
window.addEventListener("load", function(){
  setTimeout(()=>{ document.getElementById("loader").style.display="none"; },2000);
});

function toggleProfile(){
  let p = document.getElementById("profile");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function kirim(){
  let nama = prompt("Masukkan Nama Anda:");
  if(!nama){ alert("Isi nama dulu!"); return; }
  let pesan = 
    "📦 Produk: Jasa Pasang Bot\n" +
    "👤 Nama: " + nama + "\n" +
    "✅ Status: Belum diterima / silakan cek transfer";
  alert("Detail Pembayaran:\n\n" + pesan);
}
</script>

</body>
</html>
