<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-box{
  display:flex;
  align-items:center;
  gap:15px;
  padding:25px 35px;
  border-radius:25px;
  border:2px solid #00ffff;
  box-shadow:0 0 40px #00ffff;
}

.loader-box img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid #00ffff;
  box-shadow:0 0 25px #00ffff;
  object-fit:cover;
}

.loader-text{
  font-size:22px;
  font-weight:bold;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

/* VIDEO */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(1.4) contrast(1.1);
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
}

.logo h2{
  text-shadow:0 0 10px #00ffff;
}

/* BUTTON GLOBAL */
button{
  padding:15px 20px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(90deg,#8f00ff,#00ffff);
  box-shadow:0 0 25px #00ffff;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* HERO */
.hero{
  text-align:center;
  margin-top:70px;
}

.hero h1{
  font-size:30px;
  text-shadow:0 0 15px #00ffff;
}

.hero p{
  margin-top:8px;
  opacity:0.9;
}

.hero button{
  margin-top:20px;
  padding:18px 40px;
  border-radius:25px;
  font-size:18px;
}

/* SECTION */
section{
  display:none;
  padding:30px 20px;
}

/* PROFILE CARD */
.profile-card{
  background:rgba(0,0,0,0.7);
  padding:40px 25px;
  border-radius:35px;
  margin:20px;
  text-align:center;
  border:2px solid #00ffff;
  box-shadow:0 0 50px rgba(0,255,255,0.7);
  backdrop-filter:blur(15px);
}

.profile-img{
  width:150px;
  height:150px;
  border-radius:50%;
  margin:auto;
  border:5px solid #00ffff;
  box-shadow:0 0 40px #00ffff;
  object-fit:cover;
}

.profile-card h2{
  margin-top:25px;
  font-size:28px;
}

.profile-card p{
  margin:10px 0 30px;
  opacity:0.8;
}

.social-btn{
  width:100%;
  padding:18px;
  margin-bottom:20px;
  border-radius:40px;
  font-size:18px;
}

/* PRODUCT */
.card{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:25px;
  margin-bottom:25px;
  border:1px solid rgba(0,255,255,0.4);
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.price{
  color:#00ffff;
  margin:10px 0;
  font-weight:bold;
}

/* PAYMENT */
.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00ffff;
  margin-bottom:10px;
  font-weight:bold;
}

/* Input Nama Pengirim & Currency mirip */
input, select{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:15px;
  border:none;
  background:rgba(255,255,255,0.15);
  color:white;
  box-shadow:0 0 20px #00ffff;
}

/* Payment Buttons */
.payment-buttons{
  display:flex;
  gap:10px;
}
.payment-buttons button{
  flex:1;
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-box">
    <img src="loading.jpg">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<video autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <button onclick="toggleProduk()">Lihat Produk</button>
</header>

<div class="hero">
  <h1>Naruya Store Official</h1>
  <p>Solusi Digital Terpercaya & Aman</p>
  <button onclick="toggleProfile()">Profile</button>
</div>

<section id="profile">
  <div class="profile-card">
    <img src="logo.jpg" class="profile-img">
    <h2>Naruya Store</h2>
    <p>Store digital terpercaya.</p>

    <button class="social-btn" onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button class="social-btn" onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
    <button class="social-btn" onclick="window.open('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button class="social-btn" onclick="window.open('https://tiktok.com/@narayu.kiyora')">TikTok</button>
    <button class="social-btn" onclick="window.open('https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R')">Saluran WhatsApp</button>
  </div>
</section>

<section id="produk">
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>
</section>

<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>

    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">

    <select id="currency">
      <option value="IDR">IDR (Rupiah)</option>
      <option value="USD">USD (Dollar)</option>
    </select>

    <input type="number" id="total" readonly>

    <div class="payment-buttons">
      <button onclick="kirim()">Kirim Bukti</button>
      <button onclick="cekPembayaran()">Cek Pembayaran</button>
    </div>
  </div>
</section>

<script>
window.addEventListener("load", function(){
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },2000);
});

// Toggle sections
function toggleProfile(){
  const p = document.getElementById("profile");
  if(p.style.display === "block"){
    p.style.display = "none";
  } else {
    hideAll();
    p.style.display = "block";
  }
}

function toggleProduk(){
  const pr = document.getElementById("produk");
  if(pr.style.display === "block"){
    pr.style.display = "none";
  } else {
    hideAll();
    pr.style.display = "block";
  }
}

function hideAll(){
  document.getElementById("profile").style.display = "none";
  document.getElementById("produk").style.display = "none";
  document.getElementById("payment").style.display = "none";
}

function beli(nama,harga){
  hideAll();
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
}

function cekPembayaran(){
  alert("Silakan hubungi admin untuk konfirmasi pembayaran.");
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;
  let currency=document.getElementById("currency").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 "+currency+" "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
