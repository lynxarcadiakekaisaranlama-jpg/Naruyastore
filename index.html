<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f1f;
  color:white;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00e0ff;
}

.logo h1{
  font-size:22px;
  margin:0;
}

.open-btn{
  padding:10px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(45deg,#7b2ff7,#00c6ff);
}

.hero{
  text-align:center;
  padding:30px 20px;
}

.hero h2{
  font-size:28px;
  margin:10px 0;
}

.hero span{
  color:#00e0ff;
}

.products{
  padding:20px;
}

.card{
  background:#12182d;
  padding:20px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.card h3{
  margin:0;
  font-size:20px;
}

.price{
  margin:10px 0;
  color:#00e0ff;
  font-weight:bold;
}

.buy{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#7b2ff7,#00c6ff);
}

.payment{
  display:none;
  padding:20px;
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00e0ff;
  font-weight:bold;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#1c233d;
  color:white;
}

.btn-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn-kirim{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#7b2ff7,#00c6ff);
}

.btn-cek{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#00c6ff,#7b2ff7);
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h1>Naruya Store</h1>
  </div>
  <button class="open-btn" onclick="scrollToProduk()">Buka Pesanan</button>
</header>

<section class="hero">
  <h2>Solusi Digital Store <br><span>nikmati berbagai layanan premium</span></h2>
</section>

<section class="products" id="produk">

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy" onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy" onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>SC Bot Nokos</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy" onclick="beli('SC Bot Nokos',5000)">Beli</button>
  </div>

</section>

<section class="payment" id="payment">

  <img src="roro.jpg">

  <div class="timer" id="timer">QR berlaku: 300 detik</div>

  <h3>Form Konfirmasi</h3>

  <input type="text" id="kategori" readonly>
  <input type="text" id="nama" placeholder="Nama Pengirim">
  <select id="matauang">
    <option>IDR</option>
    <option>USD</option>
  </select>
  <input type="number" id="total" readonly>

  <div class="btn-group">
    <button class="btn-kirim" onclick="kirim()">Kirim Bukti</button>
    <button class="btn-cek" onclick="cek()">Cek Pembayaran</button>
  </div>

</section>

<script>
function scrollToProduk(){
  document.getElementById("produk").scrollIntoView({behavior:"smooth"});
}

function beli(nama,harga){
  document.getElementById("payment").style.display="block";
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
  document.getElementById("payment").scrollIntoView({behavior:"smooth"});
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(function(){
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa, refresh halaman.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let matauang=document.getElementById("matauang").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💰 "+matauang+"\n"+
  "💵 "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}

function cek(){
  alert("Pembayaran sedang diverifikasi admin.\nMohon tunggu ya.");
}
</script>

</body>
</html>
