<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b1a;
  color:white;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00f7ff;
}

.open-btn{
  padding:10px 15px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(45deg,#7b00ff,#00f7ff);
  color:white;
}

.hero{
  text-align:center;
  padding:30px 20px;
}

.hero h1{
  font-size:28px;
  margin:10px 0;
}

.hero span{
  color:#00f7ff;
}

.hero p{
  opacity:0.8;
}

.hero button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:linear-gradient(45deg,#7b00ff,#00f7ff);
  color:white;
  cursor:pointer;
}

.products{
  padding:20px;
}

.card{
  background:#11112a;
  padding:20px;
  margin-bottom:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,247,255,0.15);
}

.card h2{
  margin:0 0 10px;
}

.price{
  color:#00f7ff;
  font-size:18px;
  margin-bottom:10px;
}

.card button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#7b00ff;
  color:white;
  cursor:pointer;
}

.card button:hover{
  opacity:0.8;
}
</style>
</head>

<body>

<header>
  <div class="profile">
    <img src="https://i.imgur.com/4Z7bKQm.jpeg">
    <h2>Naruya Store</h2>
  </div>

  <button class="open-btn" onclick="scrollToProduk()">Buka Pesanan</button>
</header>

<section class="hero">
  <p style="border:1px solid #00f7ff;padding:8px;border-radius:20px;display:inline-block;">
    Premium Digital Products & Services
  </p>

  <h1>Solusi Digital Store <br><span>Terbaik untuk Anda</span></h1>
  <p>Layanan bot, nokos, dan panel murah & terpercaya.</p>

  <button onclick="scrollToProduk()">Lihat Produk</button>
</section>

<section class="products" id="produk">

  <div class="card">
    <h2>Jasa Pasang Bot</h2>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h2>Nokos Indo</h2>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>

  <div class="card">
    <h2>Panel Pterodactyl</h2>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h2>SC Bot Nokos</h2>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('SC Bot Nokos',5000)">Beli</button>
  </div>

</section>

<script>
function scrollToProduk(){
  document.getElementById("produk").scrollIntoView({behavior:"smooth"});
}

function beli(nama,harga){
  localStorage.setItem("produk",nama);
  localStorage.setItem("harga",harga);
  window.location.href="payment.html";
}
</script>

</body>
</html>
