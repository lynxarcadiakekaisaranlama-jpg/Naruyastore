<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  color: white;
  background-color: #15152b;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  filter: brightness(1) contrast(1.1);
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.2);
  z-index: -1;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 25px;
  background-color: rgba(21,21,43,0.8);
}

header img.logo-img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #00f7ff;
}

header h2 {
  color: #00f7ff;
  font-size: 1.5rem;
}

/* BUTTON GROUP */
.button-group {
  display: flex;
  gap: 15px;
  padding: 15px 25px;
}

.button-group button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#6f00ff,#00f7ff);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

.button-group button:hover {
  box-shadow: 0 0 15px #00f7ff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 2.2rem;
  text-shadow: 0 0 10px #00f7ff;
  margin-bottom: 10px;
}

/* PROFILE */
#profile {
  display: none;
  text-align: center;
  padding: 20px;
}

.profile-card {
  background: #15152b;
  padding: 25px;
  border-radius: 15px;
  max-width: 300px;
  margin: 0 auto;
  box-shadow: 0 0 20px rgba(0,247,255,0.2);
  border: 1px solid #00f7ff;
}

.profile-card img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #00f7ff;
  margin-bottom: 15px;
}

.profile-card button {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg,#6f00ff,#00f7ff);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

.profile-card button:hover {
  box-shadow: 0 0 15px #00f7ff;
}

/* PRODUCTS */
.products {
  padding: 20px;
  margin-top: 20px;
}

.card {
  background: #15152b;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(0,247,255,0.1);
  text-align: center;
  border: 1px solid #00f7ff;
}

.card h3 {
  margin-bottom: 10px;
}

.price {
  color: #00f7ff;
  font-size: 1.2rem;
  margin-bottom: 10px;
}

.buy-btn {
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  background: #6f00ff;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

.buy-btn:hover {
  background: #8a2be2;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader-box {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 25px;
  border-radius: 15px;
  border: 2px solid #00f7ff;
  box-shadow: 0 0 30px #00f7ff;
}

.loader-box img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #00f7ff;
  object-fit: cover;
}

.loader-text {
  color: #00f7ff;
  font-weight: bold;
  font-size: 1.1rem;
}
</style>
</head>
<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">
    <img src="logo.jpg" alt="Logo Naruya Store">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <img src="logo.jpg" alt="Logo" class="logo-img">
  <h2>Naruya Store</h2>
</header>

<!-- BUTTONS -->
<div class="button-group">
  <button onclick="toggleProfile()">Profile</button>
  <button onclick="scrollToProduk()">Lihat Produk</button>
</div>

<!-- PROFILE -->
<section id="profile">
  <div class="profile-card">
    <img src="logo.jpg" alt="PP Naruya Store">
    <button onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
    <button onclick="window.open('https://instagram.com/izuku_tsuki')">Instagram</button>
    <button onclick="window.open('https://tiktok.com/@narayu.kiyora')">TikTok</button>
    <button onclick="window.open('https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R')">Saluran WhatsApp</button>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="produk">
  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button class="buy-btn" onclick="beliProduk('Jasa Pasang Bot')">Beli</button>
  </div>
  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button class="buy-btn" onclick="beliProduk('Nokos Indo')">Beli</button>
  </div>
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button class="buy-btn" onclick="beliProduk('Panel Pterodactyl')">Beli</button>
  </div>
</section>

<script>
window.addEventListener("load",function(){
  setTimeout(()=>{document.getElementById("loader").style.display="none";},2000);
});

function toggleProfile(){
  const p = document.getElementById("profile");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function scrollToProduk(){
  const produk = document.getElementById("produk");
  if(produk.style.display === "block" || produk.style.display === "") {
    produk.scrollIntoView({behavior:"smooth"});
  }
}

function beliProduk(produk){
  let namaUser = prompt("Masukkan Nama Anda:");
  if(!namaUser){ alert("Isi nama dulu!"); return; }
  alert("Halo Admin, saya sudah melakukan pembayaran dan ingin mengkonfirmasi pesanan.\n\n📦 Produk: " 
        + produk + "\n👤 Nama: " + namaUser + "\n✅Status: Belum diterima / silakan cek transfer");
}
</script>

</body>
</html>
