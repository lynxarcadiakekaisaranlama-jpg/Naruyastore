<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Naruya Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body {background: linear-gradient(135deg,#0f172a,#020617);color:white;}
    header {display:flex;justify-content:space-between;padding:15px 30px;background: rgba(255,255,255,0.05);}
    nav a {margin-left:15px;color:white;text-decoration:none;opacity:0.7;}
    .hero {text-align:center;padding:80px 20px;}
    .grid {display:grid;grid-template-columns: repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}
    .card {background: rgba(255,255,255,0.05);padding:20px;border-radius:15px;}
    .price {color:#38bdf8;}
    button {width:100%;padding:10px;border:none;border-radius:10px;background: linear-gradient(135deg,#38bdf8,#6366f1);color:white;cursor:pointer;}
  </style>
</head>

<body>

<header>
  <h2>🚀 Naruya Store</h2>
</header>

<section class="hero">
  <h1>Welcome to Naruya Store</h1>
  <p>All stock siap kirim ⚡</p>
</section>

<div class="grid">

  <div class="card">
    <h3>Panel 1GB</h3>
    <p class="price">Rp5.000</p>
    <button onclick="beli('Panel 1GB')">Beli</button>
  </div>

  <div class="card">
    <h3>Panel 2GB</h3>
    <p class="price">Rp8.000</p>
    <button onclick="beli('Panel 2GB')">Beli</button>
  </div>

  <div class="card">
    <h3>Script Premium</h3>
    <p class="price">Rp15.000</p>
    <button onclick="beli('Script')">Beli</button>
  </div>

</div>

<script>
async function beli(product) {
  try {
    const res = await fetch("http://localhost:3000/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ product })
    });

    const data = await res.json();
    window.open(data.url, "_blank");

  } catch (err) {
    alert("Server belum aktif!");
  }
}
</script>

</body>
</html>
