<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* ================= LOADING SCREEN ================= */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#loader img{
  width:180px;
  margin-bottom:20px;
  animation:fade 1.5s infinite alternate;
  border-radius:15px;
}

@keyframes fade{
  from{opacity:0.6;}
  to{opacity:1;}
}

#loader h2{
  color:#00f7ff;
  letter-spacing:2px;
}

/* ================= VIDEO ================= */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  pointer-events:none;
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #00f7ff;
}

/* ================= BUTTON ================= */
button{
  padding:12px 22px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  box-shadow:0 0 15px rgba(0,255,255,0.6);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,255,255,1);
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  padding:80px 20px;
}

/* ================= SECTION ================= */
section{
  padding:30px 20px;
  display:none;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
}

.price{
  color:#00f7ff;
  margin:10px 0;
  font-weight:bold;
}

/* ================= PROFILE ================= */
.profile{
  text-align:center;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  margin-bottom:10px;
}

.social{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.social a{
  text-decoration:none;
  padding:12px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  background:linear-gradient(45deg,#8f00ff,#00f7ff);
  box-shadow:0 0 15px rgba(0,255,255,0.6);
}

.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00f7ff;
  margin-bottom:15px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  background:rgba(0,0,0,0.5);
  color:white;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
  <img src="loading.jpg">
  <h2>Loading Naruya Store...</h2>
</div>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h3>Naruya Store</h3>
  </div>
  <button onclick="showSection('produk')">Lihat Produk</button>
</header>

<div class="hero">
  <h2>Naruya Store Official<br>
  <span style="color:#00f7ff;">Solusi Digital Terpercaya</span></h2>
  <br>
  <button onclick="showSection('profile')">Profile</button>
</div>

<!-- PROFILE -->
<section id="profile">
  <div class="card profile">
    <img src="logo.jpg">
    <h3>Naruya Store</h3>
    <p>Store digital terpercaya.</p>

    <div class="social">
      <a href="https://wa.me/6287733976909" target="_blank">WhatsApp</a>
      <a href="https://t.me/Narayuizumi" target="_blank">Telegram</a>
      <a href="https://instagram.com/izuku_tsuki" target="_blank">Instagram</a>
      <a href="https://tiktok.com/@narayu.kiyora" target="_blank">TikTok</a>
      <a href="https://whatsapp.com/channel/0029Vb7DTylE50UbVmTs9q1R" target="_blank">Saluran WhatsApp</a>
    </div>
  </div>
</section>

<!-- PRODUK -->
<section id="produk">
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>
</section>

<!-- PAYMENT -->
<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>

    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="number" id="total" readonly>

    <button onclick="kirim()">Kirim Bukti</button>
    <br><br>
    <button onclick="showSection('produk')">Kembali</button>
  </div>
</section>

<script>

/* LOADING HILANG 2 DETIK */
window.addEventListener("load", function(){
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },2000);
});

function showSection(id){
  document.querySelectorAll("section").forEach(sec=>sec.style.display="none");
  document.getElementById(id).style.display="block";
  window.scrollTo(0,0);
}

function beli(nama,harga){
  showSection('payment');
  document.getElementById("kategori").value=nama;
  document.getElementById("total").value=harga;
  startTimer();
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    document.getElementById("timer").innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  let kategori=document.getElementById("kategori").value;
  let nama=document.getElementById("nama").value;
  let total=document.getElementById("total").value;

  if(!nama){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori+"\n"+
  "👤 "+nama+"\n"+
  "💵 "+total;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
