<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  max-width:350px;
  margin:15px auto;
}
button{
  background:#00a86b;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  width:100%;
}
button:hover{
  opacity:0.8;
}
#qrSection{
  display:none;
  margin-top:20px;
}
#timer{
  color:red;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Naruya</h2>

<!-- PRODUK 1 -->
<div class="card">
  <h3>Nokos Indonesia</h3>
  <p>Harga: Rp 10.000</p>
  <button onclick="beli('Nokos Indonesia',10000)">Beli</button>
</div>

<!-- PRODUK 2 -->
<div class="card">
  <h3>Sewa Bot 3 Bulan</h3>
  <p>Harga: Rp 50.000</p>
  <button onclick="beli('Sewa Bot 3 Bulan',50000)">Beli</button>
</div>

<!-- PRODUK 3 -->
<div class="card">
  <h3>Jasa Pasang Bot WA</h3>
  <p>Harga: Rp 15.000</p>
  <button onclick="beli('Jasa Pasang Bot WA',15000)">Beli</button>
</div>

<!-- QR SECTION -->
<div class="card" id="qrSection">
  <h3 id="produkDipilih"></h3>
  <p id="hargaDipilih"></p>

  <h4>Scan QR Dana</h4>

  <!-- GANTI LINK QR KAMU -->
  <img src="qrdana.jpg" width="260" style="display:block; margin:auto; border-radius:15px;">

  <div id="timer">Waktu: 05:00</div>
  <p id="status"></p>
</div>

<script>
let waktu = 300;
let hitung;

function beli(nama,harga){
  document.getElementById("qrSection").style.display = "block";
  document.getElementById("produkDipilih").innerHTML = nama;
  document.getElementById("hargaDipilih").innerHTML = "Total: Rp " + harga;
  waktu = 300;
  document.getElementById("status").innerHTML = "";
  startTimer();
}

function startTimer(){
  clearInterval(hitung);
  hitung = setInterval(function(){
    let menit = Math.floor(waktu / 60);
    let detik = waktu % 60;

    if(detik < 10){
      detik = "0" + detik;
    }

    document.getElementById("timer").innerHTML =
      "Waktu: " + menit + ":" + detik;

    waktu--;

    if(waktu < 0){
      clearInterval(hitung);
      document.getElementById("timer").innerHTML = "Waktu Habis!";
      document.getElementById("status").innerHTML =
        "QR Expired ❌ Silakan refresh untuk beli lagi.";
    }

  },1000);
}
</script>

</body>
</html>
