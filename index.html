<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya official</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  min-height:100vh;
  background: url("anime.jpg") no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container{
  background: rgba(0,0,40,0.7);
  backdrop-filter: blur(15px);
  padding:40px;
  border-radius:25px;
  width:95%;
  max-width:550px;
  text-align:center;
}

h1{
  font-size:28px;
  margin-bottom:25px;
}

.card{
  background: rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

button{
  background:#00aaff;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#0077cc;
}

#qrSection{
  display:none;
  margin-top:25px;
}

#qris{
  width:350px;
  max-width:100%;
  border-radius:20px;
  margin-top:15px;
}

#status{
  margin-top:15px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>Naruya Store</h1>

<div class="card">
  <h3>Nokos Indonesia</h3>
  <p>Rp 4.000</p>
  <button onclick="beli('Nokos Indonesia',4000)">Beli</button>
</div>

<div class="card">
  <h3>Panel Pterodactyl</h3>
  <p>Rp 10.000</p>
  <button onclick="beli('Panel Pterodactyl',10000)">Beli</button>
</div>

<div class="card">
  <h3>Jasa Pasang Bot</h3>
  <p>Rp 5.000</p>
  <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
</div>

<div id="qrSection">
  <h2 id="produkDipilih"></h2>
  <p id="hargaDipilih"></p>

  <img id="qris" src="roro.jpg">

  <p id="status">Terimakasih telah membeli produk di Naruya official</p>
</div>

</div>

<script>
function beli(nama, harga){
  document.getElementById("qrSection").style.display = "block";
  document.getElementById("produkDipilih").innerHTML = nama;
  document.getElementById("hargaDipilih").innerHTML = "Total: Rp " + harga;
}
</script>

</body>
</html>
