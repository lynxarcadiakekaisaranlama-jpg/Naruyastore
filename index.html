<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruya Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  color:white;
  overflow-x:hidden;
}

/* LOADING */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-box{
  display:flex;
  align-items:center;
  gap:15px;
  padding:25px 35px;
  border-radius:25px;
  border:2px solid #00ffff;
  box-shadow:0 0 40px #00ffff;
}

.loader-box img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid #00ffff;
  box-shadow:0 0 25px #00ffff;
  object-fit:cover;
}

.loader-text{
  font-size:22px;
  font-weight:bold;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

/* VIDEO */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
}

.logo h2{
  text-shadow:0 0 10px #00ffff;
}

/* BUTTON */
button{
  padding:14px 20px;
  border:none;
  border-radius:15px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#8f00ff,#00ffff);
  box-shadow:0 0 20px #00ffff;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* HERO */
.hero{
  text-align:center;
  margin-top:70px;
}

.hero h1{
  font-size:32px;
  text-shadow:0 0 15px #00ffff;
}

.hero p{
  margin-top:8px;
  font-size:14px;
  opacity:0.9;
}

.hero button{
  margin-top:20px;
}

/* SECTION */
section{
  display:none;
  padding:40px 20px;
}

.card{
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:25px;
  margin-bottom:25px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.4);
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.price{
  color:#00ffff;
  margin:10px 0;
  font-weight:bold;
  font-size:18px;
}

/* PAYMENT */
.payment img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

.timer{
  color:#00ffff;
  margin-bottom:10px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-box">
    <img src="loading.jpg">
    <div class="loader-text">Loading Naruya Store...</div>
  </div>
</div>

<video autoplay muted loop playsinline>
  <source src="anime.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <div class="logo">
    <img src="logo.jpg">
    <h2>Naruya Store</h2>
  </div>
  <button onclick="showProduk()">Lihat Produk</button>
</header>

<div class="hero">
  <h1>Naruya Store Official</h1>
  <p>Solusi Digital Terpercaya & Aman</p>
  <button onclick="showProfile()">Profile</button>
</div>

<section id="profile">
  <div class="card">
    <h3>Social Media</h3>
    <button onclick="window.open('https://wa.me/6287733976909')">WhatsApp</button>
    <button onclick="window.open('https://t.me/Narayuizumi')">Telegram</button>
  </div>
</section>

<section id="produk">
  <div class="card">
    <h3>Panel Pterodactyl</h3>
    <div class="price">Rp 7.000</div>
    <button onclick="beli('Panel Pterodactyl',7000)">Beli</button>
  </div>

  <div class="card">
    <h3>Jasa Pasang Bot</h3>
    <div class="price">Rp 5.000</div>
    <button onclick="beli('Jasa Pasang Bot',5000)">Beli</button>
  </div>

  <div class="card">
    <h3>Nokos Indo</h3>
    <div class="price">Rp 4.000</div>
    <button onclick="beli('Nokos Indo',4000)">Beli</button>
  </div>
</section>

<section id="payment" class="payment">
  <div class="card">
    <img src="roro.jpg">
    <div class="timer" id="timer">QR berlaku: 300 detik</div>
    <input type="text" id="kategori" readonly>
    <input type="text" id="nama" placeholder="Nama Pengirim">
    <input type="text" id="total" readonly>
    <button onclick="kirim()">Kirim Bukti</button>
  </div>
</section>

<script>
window.addEventListener("load", function(){
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },2000);
});

function hideAll(){
  produk.style.display="none";
  profile.style.display="none";
  payment.style.display="none";
}

function showProduk(){
  hideAll();
  produk.style.display="block";
}

function showProfile(){
  hideAll();
  profile.style.display="block";
}

function formatRupiah(angka){
  return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function beli(nama,harga){
  hideAll();
  payment.style.display="block";
  kategori.value = nama;
  total.value = formatRupiah(harga);
  startTimer();
}

let waktu=300;
let interval;

function startTimer(){
  waktu=300;
  clearInterval(interval);
  interval=setInterval(()=>{
    waktu--;
    timer.innerText="QR berlaku: "+waktu+" detik";
    if(waktu<=0){
      clearInterval(interval);
      alert("QR kadaluarsa.");
    }
  },1000);
}

function kirim(){
  if(!nama.value){
    alert("Isi nama dulu!");
    return;
  }

  let pesan="Halo Admin, saya sudah bayar.\n\n"+
  "📦 "+kategori.value+"\n"+
  "👤 "+nama.value+"\n"+
  "💵 "+total.value;

  window.location.href="https://t.me/Narayuizumi?text="+encodeURIComponent(pesan);
}
</script>

</body>
</html>
