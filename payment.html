<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirim Bukti Pembayaran</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f1a;
  background-image: linear-gradient(rgba(255,0,80,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,0,80,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  color:white;
}

.container{
  max-width:400px;
  margin:50px auto;
  padding:25px;
  background:rgba(20,20,35,0.9);
  border-radius:15px;
  box-shadow:0 0 25px rgba(255,0,80,0.3);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:5px;
  font-size:14px;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #444;
  background:#1a1a2e;
  color:white;
}

input[type="file"]{
  background:#1a1a2e;
}

button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(45deg,#ff003c,#ff5e00);
  color:white;
  box-shadow:0 0 15px rgba(255,0,60,0.6);
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
  <h2>Kirim Bukti Pembayaran</h2>

  <form onsubmit="kirimBukti(event)">

    <label>Kategori</label>
    <select id="kategori" required>
      <option value="">PILIH KATEGORI</option>
      <option>Jasa Pasang Bot</option>
      <option>Nokos Indo</option>
      <option>Panel Pterodactyl</option>
      <option>SC Bot Nokos</option>
    </select>

    <label>Nama</label>
    <input type="text" id="nama" required>

    <label>Mata Uang</label>
    <select id="matauang" required>
      <option value="">Pilih Mata Uang</option>
      <option>IDR</option>
      <option>USD</option>
    </select>

    <label>Total</label>
    <input type="number" id="total" required>

    <label>Upload Bukti</label>
    <input type="file" required>

    <button type="submit">Kirim Bukti</button>

  </form>
</div>

<script>
function kirimBukti(e){
  e.preventDefault();

  let kategori = document.getElementById("kategori").value;
  let nama = document.getElementById("nama").value;
  let matauang = document.getElementById("matauang").value;
  let total = document.getElementById("total").value;

  let pesan = 
  "Halo Admin, saya sudah bayar.%0A%0A" +
  "Kategori: " + kategori + "%0A" +
  "Nama: " + nama + "%0A" +
  "Mata Uang: " + matauang + "%0A" +
  "Total: " + total;

  window.location.href = "https://t.me/Narayuizumi?text=" + pesan;
}
</script>

</body>
</html>
